version: '3.8'

services:
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - website
      - model

  website:
    build:
      context: ./website
      dockerfile: Dockerfile
    environment:
      # Use MinIO inside the docker network
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_BUCKET=badminton-videos
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - REDIS_URL=redis://redis:6379
      # S3 client config for public urls (browser to MinIO proxy via nginx or direct)
      # For presigned uploads from the browser, we use localhost:9000
      - NEXT_PUBLIC_S3_ENDPOINT=http://localhost:9000
      - MODEL_SERVER_URL=http://model:8000
    depends_on:
      - minio
      - redis


  model:
    build:
      context: ./model
      dockerfile: Dockerfile
    # Exposing the port so we can test directly if needed
    ports:
      - "8000:8000"

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # Create a bucket automatically
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      /usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/badminton-videos || true;
      /usr/bin/mc anonymous set public myminio/badminton-videos || true;
      "

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  minio_data:
  redis_data:

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Allow large video uploads
    client_max_body_size 500M;

    server {
        listen 80;
        server_name localhost;

        # Route requests starting with /api/model/ to the FastAPI server
        location /api/model/ {
            # We use rewrite to strip the /api/model prefix before sending it to FastAPI
            # E.g. /api/model/v1/predict/video -> /v1/predict/video
            rewrite ^/api/model/(.*)$ /$1 break;
            proxy_pass http://model:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Route everything else to the Next.js website
        location / {
            proxy_pass http://website:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Needed for Next.js Fast Refresh (WebSocket)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
